/* ===== LECTURA SEGURA DE LOCALSTORAGE ===== */
function safeGet(key, fallback) {
  try {
    var raw = localStorage.getItem(key);
    if (raw === null || raw === undefined) return fallback;
    var parsed = JSON.parse(raw);
    if (parsed === null || parsed === undefined) return fallback;
    return parsed;
  } catch (e) {
    /* Si hay error, borrar el dato corrupto y devolver fallback */
    try { localStorage.removeItem(key); } catch (ex) {}
    return fallback;
  }
}

function safeSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    return false;
  }
}

/* ===== LIMPIAR TODOS LOS DATOS ===== */
function clearAllData() {
  try {
    var keysToRemove = [];

      var k = localStorage.key(i);
      if (k && (k.indexOf("wc26_") === 0)) keysToRemove.push(k);
    }
    for (var j = 0; j < keysToRemove.length; j++) {

function isLocked(ph) {
  if (!LOCKS[ph]) return false;
  return Date.now() > LOCKS[ph].getTime();
}

function timeLeft(ph) {
  if (!LOCKS[ph]) return "";
  var diff = LOCKS[ph].getTime() - Date.now();
  if (diff <= 0) return "Bloqueada";
  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  if (d > 0) return "Cierra en " + d + "d " + h + "h";
  var m = Math.floor((diff % 3600000) / 60000);
  return "Cierra en " + h + "h " + m + "m";
}

function getU() { return safeGet("wc26_u", {}); }
function saveU(u) { safeSet("wc26_u", u); }

function doReg(e, p, cp) {
  if (!e || !p) return toast("Completa todos los campos", "tE");
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) return toast("Correo invalido", "tE");
  if (p.length < 6) return toast("Minimo 6 caracteres", "tE");
  if (p !== cp) return toast("Las contrasenas no coinciden", "tE");
  var u = getU();
  if (u[e]) return toast("Ese correo ya esta registrado", "tE");
  u[e] = {p: btoa(p)};
  saveU(u);
  user = e;
  sessionStorage.setItem("wc26_s", e);
  toast("Cuenta creada exitosamente", "tS");
  render();
}

function doLog(e, p) {
  if (!e || !p) return toast("Completa todos los campos", "tE");
  var u = getU();
  if (!u[e] || u[e].p !== btoa(p)) return toast("Correo o contrasena incorrectos", "tE");
  user = e;
  sessionStorage.setItem("wc26_s", e);
  toast("Bienvenido de vuelta", "tS");
  render();

function emptyPreds() {

/* ===== LOGICA DE GRUPOS ===== */
function calcSt(gi, preds) {
  var teams = GR[gi].t.map(function(name) {
    return {name:name, pts:0, gd:0, gf:0, ga:0};
  });
  MSI.forEach(function(m, mi) {
    var key = gi + "_" + mi;
    var r = preds.g[key];
    var gh = 0, ga = 0;
    if (r === "1") { gh=2; ga=0; teams[m[0]].pts+=3; }
    else if (r === "X") { gh=1; ga=1; teams[m[0]].pts+=1; teams[m[1]].pts+=1; }
    else if (r === "2") { gh=0; ga=2; teams[m[1]].pts+=3; }
    teams[m[0]].gf+=gh; teams[m[0]].ga+=ga; teams[m[0]].gd+=gh-ga;
    teams[m[1]].gf+=ga; teams[m[1]].ga+=gh; teams[m[1]].gd+=ga-gh;
  });
  teams.sort(function(a,b) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return a.name.localeCompare(b.name);
  });
  return teams;
}

function getQual(preds) {
  var allSt = GR.map(function(_,i) { return calcSt(i, preds); });
  var winners = allSt.map(function(s) { return s[0].name; });
  var runners = allSt.map(function(s) { return s[1].name; });
  var thirds = allSt.map(function(s) { return s[2]; });
  thirds.sort(function(a,b) {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return a.name.localeCompare(b.name);
  });
  var best3 = thirds.slice(0,8).map(function(t) { return t.name; });
  return {winners:winners, runners:runners, best3:best3, allSt:allSt};
}

function resSlot(slot, q) {
  if (slot.tp === "w") return q.winners[slot.g];
  if (slot.tp === "r") return q.runners[slot.g];
  if (slot.tp === "3") return q.best3[slot.rk];
  return "?";
}

function getR32Teams(preds) {
  var q = getQual(preds);
  return R32D.map(function(m) {
    return {home:resSlot(m.h,q), away:resSlot(m.a,q), lb:m.lb};
  });
}

function getNext(prevPreds, prevTeams, bracket) {
  return bracket.map(function(pair) {
    var hn = prevPreds[pair[0]];
    var an = prevPreds[pair[1]];
    return {
      home: hn || prevTeams[pair[0]].home,
      away: an || prevTeams[pair[1]].away,
      lb: prevTeams[pair[0]].home + " vs " + prevTeams[pair[1]].away
    };
  });
}

function isGrpDone(preds) {
  var c = 0;
  for (var gi = 0; gi < 12; gi++)
    for (var mi = 0; mi < 6; mi++)
      if (preds.g[gi + "_" + mi]) c++;
  return c === 72;
}

function isPhDone(preds, ph) {
  if (ph === "r32") return Object.keys(preds.r32).length === 16;
  if (ph === "r16") return Object.keys(preds.r16).length === 8;
  if (ph === "qf")  return Object.keys(preds.qf).length === 4;
  if (ph === "sf")  return Object.keys(preds.sf).length === 2;
  if (ph === "final") return preds.f !== null && preds.t !== null;
  return false;
}

function getProg(p) {
  var d = Object.keys(p.g).length;
  d += Object.keys(p.r32).length;
  d += Object.keys(p.r16).length;
  d += Object.keys(p.qf).length;
  d += Object.keys(p.sf).length;
  if (p.f) d++;
  if (p.t) d++;
  return d;
}

var canvasRAF = null;
function initCanvas() {
  var cv = document.getElementById("hCanvas");
  if (!cv) return;
  var ctx = cv.getContext("2d");
  var w, h, particles = [];

  function resize() {
    w = cv.width = cv.parentElement.offsetWidth;
    h = cv.height = cv.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  for (var i = 0; i < 55; i++) {
    particles.push({
      x: Math.random()*w, y: Math.random()*h,
      r: Math.random()*2+0.5,
      dx: (Math.random()-0.5)*0.35,
      dy: (Math.random()-0.5)*0.25,
      a: Math.random()*0.45+0.1
    });
  }

  function draw() {
    ctx.clearRect(0,0,w,h);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(212,168,83," + p.a + ")";
      ctx.fill();
    }
    for (var i = 0; i < particles.length; i++) {
      for (var j = i+1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 110) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = "rgba(212,168,83," + (0.05*(1-dist/110)) + ")";
          ctx.stroke();
        }
      }
    }
    canvasRAF = requestAnimationFrame(draw);
  }
  draw();
}

function stopCanvas() {
  if (canvasRAF) { cancelAnimationFrame(canvasRAF); canvasRAF = null; }
}

/* ===== FASE RENDER ===== */
function renderPhase(preds) {
  if (phase === "groups") return renderGroups(preds);
  if (phase === "r32") {
    if (!isGrpDone(preds)) return lockMsg("Completa la Fase de Grupos para desbloquear");
    return renderKO(preds, "r32", getR32Teams(preds), "r32", 16, isLocked("groups"));
  }
  if (phase === "r16") {
    if (!isGrpDone(preds) || !isPhDone(preds,"r32")) return lockMsg("Completa los Octavos de Final para desbloquear");
    return renderKO(preds, "r16", getNext(preds.r32, getR32Teams(preds), R16D), "r16", 8, isLocked("r32"));
  }
  if (phase === "qf") {
    if (!isPhDone(preds,"r16")) return lockMsg("Completa los Cuartos de Final para desbloquear");
    var r16t = getNext(preds.r32, getR32Teams(preds), R16D);
    return renderKO(preds, "qf", getNext(preds.r16, r16t, QFD), "qf", 4, isLocked("r16"));
  }
  if (phase === "sf") {
    if (!isPhDone(preds,"qf")) return lockMsg("Completa las Semifinales para desbloquear");
    var r16t = getNext(preds.r32, getR32Teams(preds), R16D);
    var qft = getNext(preds.r16, r16t, QFD);
    return renderFinal(preds, getNext(preds.qf, qft, SFD), isLocked("qf"));
  }
  if (phase === "summary") return renderSummary(preds);
  return "";
}

    html += '<div class="km"><div class="kmL">'+escHtml(m.lb)+'</div><div style="display:flex;flex-direction:column;gap:6px">' +
      kTBtn(storeKey, i, m.home, sel, dis) +
      '<div class="kVS">VS</div>' +
      kTBtn(storeKey, i, m.away, sel, dis) +
    '</div></div>';
  }
  html += '</div>';
  return html;
}

function kTBtn(ks, ki, name, sel, dis) {
  return '<div class="kT'+(sel===name?' sel':'')+dis+'" data-ks="'+ks+'" data-ki="'+ki+'" data-kv="'+escHtml(name)+'">' +
    '<span style="font-size:16px">'+escHtml(FL[name]||'')+'</span>' +
    '<span class="tBdg" style="background:'+TC[name]+'">'+escHtml(AB[name])+'</span>' +
    '<span style="flex:1;font-weight:500">'+escHtml(name)+'</span>' +
    '<div class="ck"><i class="fa-solid fa-check"></i></div>' +
  '</div>';
}

/* ===== FINAL RENDER ===== */
function renderFinal(preds, sft, locked) {
  var champ = preds.f;
  var third = preds.t;
  var sfL0 = (preds.sf[0]===sft[0].home)?sft[0].away:sft[0].home;
  var sfL1 = (preds.sf[1]===sft[1].home)?sft[1].away:sft[1].home;
  var dis = locked?" dis":"";

  var html = "";
  if (locked) {
    html += '<div class="lockBan"><i class="fa-solid fa-lock"></i> Final bloqueada - El plazo ha vencido</div>';
  } else {
    var tl = timeLeft("sf");
    if (tl) html += '<div class="timeBan"><i class="fa-solid fa-clock"></i> ' + escHtml(tl) + '</div>';
  }
  html += '<h2 class="font-display" style="font-weight:800;font-size:22px;margin-bottom:4px">Final</h2>';
  html += '<p style="font-size:13px;color:var(--txt2);margin-bottom:20px">Predice el campeon y el tercer lugar.</p>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">';

  html += '<div class="km" style="border-color:'+(third?'var(--acc)':'var(--brd)')+'">' +
    '<div class="kmL"><i class="fa-solid fa-medal" style="color:#cd7f32;margin-right:4px"></i> Tercer Puesto</div>' +
    '<div style="display:flex;flex-direction:column;gap:6px">' +
    kTBtn("t","-1",sfL0,third,dis) +
    '<div class="kVS">VS</div>' +
    kTBtn("t","-1",sfL1,third,dis) +
    '</div></div>';

  html += '<div class="km" style="border-color:'+(champ?'var(--acc)':'var(--brd)')+'">' +
    '<div class="kmL"><i class="fa-solid fa-trophy" style="color:var(--acc);margin-right:4px"></i> Gran Final</div>' +
    '<div style="display:flex;flex-direction:column;gap:6px">' +
    kTBtn("f","-1",sft[0].home,champ,dis) +
    '<div class="kVS">VS</div>' +
    kTBtn("f","-1",sft[0].away,champ,dis) +
    '</div></div>';

  html += '</div>';

  if (champ) {
    html += '<div class="champBox" style="margin-top:28px">' +
      '<i class="fa-solid fa-trophy" style="font-size:48px;color:var(--acc);display:block;margin-bottom:12px"></i>' +
      '<div class="font-display" style="font-weight:900;font-size:32px;margin-bottom:4px">'+escHtml(FL[champ]||'')+' '+escHtml(champ)+'</div>' +
      '<div style="font-size:13px;color:var(--txt2)">Tu campeon predicho para el Mundial 2026</div>' +
      (third?'<div style="margin-top:10px;font-size:12px;color:var(--mut)">Tercer lugar: '+escHtml(FL[third]||'')+' '+escHtml(third)+'</div>':'') +
    '</div>';
  }
  return html;
}

/* ===== RESUMEN RENDER ===== */
function renderSummary(preds) {
  var prog = getProg(preds);
  var pct = Math.round(prog/TOTAL*100);

  var html = '<h2 class="font-display" style="font-weight:800;font-size:22px;margin-bottom:4px">Mi Quiniela</h2>';
  html += '<p style="font-size:13px;color:var(--txt2);margin-bottom:20px">Resumen de todas tus predicciones</p>';

  if (preds.f) {
    html += '<div class="champBox" style="margin-bottom:24px">' +
      '<i class="fa-solid fa-trophy" style="font-size:44px;color:var(--acc);display:block;margin-bottom:10px"></i>' +
      '<div class="font-display" style="font-weight:900;font-size:30px;margin-bottom:4px">'+escHtml(FL[preds.f]||'')+' '+escHtml(preds.f)+'</div>' +
      '<div style="font-size:13px;color:var(--txt2)">Tu campeon</div>' +
      (preds.t?'<div style="margin-top:8px;font-size:12px;color:var(--mut)">Tercer lugar: '+escHtml(FL[preds.t]||'')+' '+escHtml(preds.t)+'</div>':'') +
    '</div>';
  }

  html += '<div style="padding:18px;border-radius:12px;background:var(--card);border:1px solid var(--brd);margin-bottom:24px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
      '<span class="font-display" style="font-weight:700">Progreso general</span>' +
      '<span class="font-display" style="font-weight:800;font-size:18px;color:var(--acc)">'+pct+'%</span>' +
    '</div>' +
    '<div class="pBar" style="height:8px;border-radius:4px"><div class="pFill" style="width:'+pct+'%;border-radius:4px"></div></div>' +
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;text-align:center;font-size:11px;color:var(--txt2)">' +
      '<div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+Object.keys(preds.g).length+'</div>Grupos</div>' +
      '<div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+Object.keys(preds.r32).length+'</div>Octavos</div>' +
      '<div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+(Object.keys(preds.r16).length+Object.keys(preds.qf).length+Object.keys(preds.sf).length)+'</div>Elim.</div>' +
      '<div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+((preds.f?1:0)+(preds.t?1:0))+'</div>Final</div>' +
    '</div></div>';

  html += '<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Clasificados por grupo</h3>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px">';

  for (var gi = 0; gi < 12; gi++) {
    var st = calcSt(gi, preds);
    var done = 0;
    for (var mi = 0; mi < 6; mi++) { if (preds.g[gi+"_"+mi]) done++; }
    html += '<div style="padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--brd)">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
        '<span class="font-display" style="font-weight:800;color:var(--acc)">Grupo '+GR[gi].n+'</span>' +
        '<span style="font-size:10px;color:'+(done===6?'var(--grn)':'var(--mut)')+'">'+done+'/6</span>' +
      '</div>';
    for (var ti = 0; ti < 3; ti++) {
      var t = st[ti];
      var clr = ti<2?"var(--grn)":"var(--acc)";
      var label = ti===0?"1ro":ti===1?"2do":"3ro";
      html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px">' +
        '<span style="width:28px;font-size:9px;font-weight:700;color:'+clr+'">'+label+'</span>' +
        '<span style="font-size:14px">'+escHtml(FL[t.name]||'')+'</span>' +
        '<span class="tBdg" style="background:'+TC[t.name]+'">'+escHtml(AB[t.name])+'</span>' +
        '<span style="font-weight:700;color:'+clr+'">'+t.pts+' pts</span></div>';
    }
    html += '</div>';
  }
  html += '</div>';

  if (isGrpDone(preds)) {
    var q = getQual(preds);
    html += '<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Mejores terceros</h3>';
    html += '<div style="padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--brd);margin-bottom:24px">' +
      '<div style="display:flex;flex-wrap:wrap;gap:8px">';
    for (var i = 0; i < 8; i++) {
      var name = q.best3[i];
      html += '<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--brd);font-size:12px">' +
        '<span style="width:20px;font-weight:700;color:var(--acc);font-size:10px">'+(i+1)+'</span>' +
        '<span>'+escHtml(FL[name]||'')+'</span>' +
        '<span class="tBdg" style="background:'+TC[name]+'">'+escHtml(AB[name])+'</span></div>';
    }
    html += '</div></div>';
  }

  if (isPhDone(preds,"r32")) {
    html += '<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Bracket eliminatorio</h3>';
    var r32t = getR32Teams(preds);
    var phases = [
      {name:"Octavos", pr:preds.r32, tm:r32t},
      {name:"Cuartos", pr:preds.r16, tm:getNext(preds.r32,r32t,R16D)},
      {name:"Semifinal", pr:preds.qf, tm:getNext(preds.r16,getNext(preds.r32,r32t,R16D),QFD)},
      {name:"Final", pr:preds.sf, tm:getNext(preds.qf,getNext(preds.r16,getNext(preds.r32,r32t,R16D),QFD),SFD)}
    ];
    for (var pi = 0; pi < phases.length; pi++) {
      var ph = phases[pi];
      html += '<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--acc);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">'+escHtml(ph.name)+'</div>';
      for (var mi = 0; mi < ph.tm.length; mi++) {
        var m = ph.tm[mi];
        var sel = ph.pr[mi];
        html += '<div style="display:flex;align-items:center;gap:5px;padding:4px 0;font-size:12px">' +
          '<span>'+escHtml(FL[m.home]||'')+'</span>' +
          '<span class="tBdg" style="background:'+TC[m.home]+';width:24px;height:18px;font-size:7px">'+escHtml(AB[m.home])+'</span>' +
          '<span style="color:'+(sel===m.home?'var(--grn)':'var(--mut)')+'">'+escHtml(m.home)+'</span>' +
          '<span style="color:var(--mut);margin:0 3px">vs</span>' +
          '<span>'+escHtml(FL[m.away]||'')+'</span>' +
          '<span class="tBdg" style="background:'+TC[m.away]+';width:24px;height:18px;font-size:7px">'+escHtml(AB[m.away])+'</span>' +
          '<span style="color:'+(sel===m.away?'var(--grn)':'var(--mut)')+'">'+escHtml(m.away)+'</span></div>';
      }
      html += '</div>';
    }
    if (preds.f) {
      html += '<div style="padding:12px 16px;border-radius:10px;background:var(--aG);border:1px solid rgba(212,168,83,.15);font-size:13px;display:flex;align-items:center;gap:8px">' +
        '<i class="fa-solid fa-trophy" style="color:var(--acc)"></i>' +
        '<span style="font-weight:600">'+escHtml(FL[preds.f]||'')+' '+escHtml(preds.f)+'</span>' +
        '<span style="color:var(--txt2)">- Campeon</span></div>';
    }
  }
  return html;
}

/* ===== EVENT BINDING ===== */
document.addEventListener("click", function(e) {
  var el = e.target;

  /* Tabs de grupos */
  if (el.classList.contains("sTab")) {
    gTab = parseInt(el.getAttribute("data-gt"));
    render();
    return;
  }

  /* Botones 1/X/2 */
  if (el.classList.contains("rBt") && !el.disabled) {
    var gk = el.getAttribute("data-gk");
    var gv = el.getAttribute("data-gv");
    var preds = getP();
    if (preds.g[gk] === gv) { delete preds.g[gk]; }
    else { preds.g[gk] = gv; }
    saveP(preds);
    render();
    return;
  }

  /* Botones eliminacion */
  if (el.classList.contains("kT") && !el.classList.contains("dis")) {
    var ks = el.getAttribute("data-ks");
    var ki = el.getAttribute("data-ki");
    var kv = el.getAttribute("data-kv");
    var preds = getP();

    if (ks === "f") {
      preds.f = (preds.f === kv) ? null : kv;
    } else if (ks === "t") {
      preds.t = (preds.t === kv) ? null : kv;
    } else {
      if (!preds[ks]) preds[ks] = {};
      var idx = parseInt(ki);
      if (preds[ks][idx] === kv) { delete preds[ks][idx]; }
      else { preds[ks][idx] = kv; }
    }
    saveP(preds);
    render();
    return;
  }
});

/* ===== INIT ===== */
(function() {
  /* Primero limpiar datos corruptos silenciosamente */
  try {
    var s = sessionStorage.getItem("wc26_s");
    if (s) {
      var u = safeGet("wc26_u", {});
      if (u[s]) user = s;
      else {
        /* Sesion invalida, limpiar */
        try { sessionStorage.removeItem("wc26_s"); } catch(ex) {}
      }
    }
  } catch(e) {
    try { sessionStorage.removeItem("wc26_s"); } catch(ex) {}
    user = null;
  }
  render();

  window.addEventListener("resize", function() {
    var mb = document.getElementById("hamburger");
    if (mb) mb.style.display = window.innerWidth <= 768 ? "block" : "none";
  });
})();
</script>
