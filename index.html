function calcSt(gi,preds){var teams=GR[gi].t.map(function(n){return{name:n,pts:0,gd:0,gf:0,ga:0}});MSI.forEach(function(m,mi){var key=gi+"_"+mi,r=preds.g[key],gh=0,ga=0;if(r==="1"){gh=2;ga=0;teams[m[0]].pts+=3}else if(r==="X"){gh=1;ga=1;teams[m[0]].pts+=1;teams[m[1]].pts+=1}else if(r==="2"){gh=0;ga=2;teams[m[1]].pts+=3}teams[m[0]].gf+=gh;teams[m[0]].ga+=ga;teams[m[0]].gd+=gh-ga;teams[m[1]].gf+=ga;teams[m[1]].ga+=gh;teams[m[1]].gd+=ga-gh});teams.sort(function(a,b){if(b.pts!==a.pts)return b.pts-a.pts;if(b.gd!==a.gd)return b.gd-a.gd;if(b.gf!==a.gf)return b.gf-a.gf;return a.name.localeCompare(b.name)});return teams}

function getNext(pp,pt,br){return br.map(function(pair){var hn=pp[pair[0]],an=pp[pair[1]];return{home:hn||pt[pair[0]].home,away:an||pt[pair[1]].away,lb:pt[pair[0]].home+" vs "+pt[pair[1]].away}})}
